apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-demo
  labels:
    app.kubernetes.io/name: delivery-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: delivery-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: delivery-demo
    spec:
      containers:
        - name: app
          image: public.ecr.aws/nginx/nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
