apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: delivery-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mrsddq/terraform-gitops-delivery-platform.git
    targetRevision: main
    path: kubernetes/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: delivery-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
